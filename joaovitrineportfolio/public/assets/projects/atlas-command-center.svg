<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B0B0B" />
      <stop offset="1" stop-color="#070707" />
    </linearGradient>
    <radialGradient id="halo" cx="0.74" cy="0.5" r="0.5">
      <stop offset="0" stop-color="rgba(200,200,200,0.18)" />
      <stop offset="1" stop-color="rgba(200,200,200,0)" />
    </radialGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1" />
    </pattern>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)" />
  <rect width="1200" height="675" fill="url(#grid)" />
  <rect width="1200" height="675" fill="url(#halo)" />

  <g transform="translate(80,80)" font-family="ui-monospace,monospace">
    <text fill="#9A9A9A" letter-spacing="6" font-size="11">ATLAS SYSTEM / ATL-01 / NO. 27122005</text>
    <text y="130" font-size="120" font-weight="700" letter-spacing="-4" fill="#E8E8E8">ATLAS</text>
    <text y="250" font-size="120" font-weight="700" letter-spacing="-4" fill="#8A8A8A">COMMAND</text>
    <g transform="translate(0,330)" font-size="11" letter-spacing="3" fill="#6E6E6E">
      <text>PERSONAL COMMAND SYSTEM &#183; AI &#183; AUTOMATION &#183; SMART HOME</text>
    </g>
  </g>

  <!-- command core orbit -->
  <g transform="translate(880,338)" stroke="#C8C8C8" stroke-width="1" fill="none" opacity="0.55">
    <circle cx="0" cy="0" r="150" stroke-width="0.6" />
    <circle cx="0" cy="0" r="110" stroke-width="0.6" />
    <circle cx="0" cy="0" r="70" />
    <circle cx="0" cy="0" r="22" fill="#E8E8E8" stroke="none" />
    <circle cx="0" cy="0" r="38" stroke-width="0.6" />
    <line x1="-160" y1="0" x2="160" y2="0" stroke-width="0.4" />
    <line x1="0" y1="-160" x2="0" y2="160" stroke-width="0.4" />
    <circle cx="110" cy="0" r="5" fill="#C8C8C8" stroke="none" />
    <circle cx="-78" cy="-78" r="5" fill="#C8C8C8" stroke="none" />
    <circle cx="0" cy="150" r="5" fill="#C8C8C8" stroke="none" />
    <circle cx="-150" cy="0" r="4" fill="#6E6E6E" stroke="none" />
  </g>

  <rect x="0" y="670" width="1200" height="5" fill="#FF3B1F" />
</svg>
