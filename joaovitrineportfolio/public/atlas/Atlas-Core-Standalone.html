  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

2FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"5f692147-db8a-4169-87ce-cf3499924f42\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n:root {\n  --black:    #030303;\n  --bg-0:     #060607;\n  --bg-1:     #0b0b0c;\n  --panel:    #0e0e10;\n  --panel-2:  #131316;\n  --graphite: #161618;\n  --line:     rgba(255,255,255,0.09);\n  --line-2:   rgba(255,255,255,0.16);\n  --txt:      #ECECEE;\n  --txt-2:    #9A9AA0;\n  --txt-3:    #5C5C62;\n  --white:    #F4F4F4;\n  --blue:     #FF2A4F;   /* status / active accent — used <5% */\n  --orange:   #FF2A4F;   /* alert accent — used <5% */\n  --mono: 'IBM Plex Mono', ui-monospace, monospace;\n  --sans: 'Space Grotesk', system-ui, sans-serif;\n}\n\n* { box-sizing: border-box; }\nhtml { scroll-behavior: smooth; }\nbody {\n  margin: 0; background: var(--black); color: var(--txt);\n  font-family: var(--sans); -webkit-font-smoothing: antialiased; overflow-x: hidden;\n}\na { color: inherit; text-decoration: none; }\n.mono { font-family: var(--mono); }\n\n/* ---------- STAGE (full-viewport 3D) ---------- */\n.stage { position: relative; width: 100%; height: 100svh; min-height: 640px;\n  background:\n    radial-gradient(120% 90% at 50% 30%, #101012 0%, #08080a 55%, #030303 100%); overflow: hidden; }\n#scene { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }\n\n/* film grain + vignette over canvas for cinematic depth */\n.stage::after {\n  content: \"\"; position: absolute; inset: 0; pointer-events: none; z-index: 3;\n  background: radial-gradient(120% 100% at 50% 45%, transparent 55%, rgba(0,0,0,0.55) 100%);\n}\n\n/* ---------- LOADING ---------- */\n.loader { position: absolute; inset: 0; z-index: 30; display: grid; place-items: center;\n  background: var(--black); transition: opacity .8s ease; }\n.loader.hide { opacity: 0; pointer-events: none; visibility: hidden; }\n.loader .l-mark { width: 30px; height: 30px; position: relative; }\n.loader .l-mark::before, .loader .l-mark::after { content: \"\"; position: absolute; inset: 0;\n  border: 1px solid var(--line-2); border-radius: 3px; }\n.loader .l-mark::after { animation: spin 1.4s cubic-bezier(.6,.1,.3,.9) infinite; border-top-color: var(--white); border-radius: 4px; }\n.loader .l-txt { position: absolute; bottom: 16%; font-family: var(--mono); font-size: 11px;\n  letter-spacing: 0.34em; color: var(--txt-3); text-transform: uppercase; }\n@keyframes spin { to { transform: rotate(360deg); } }\n\n/* ---------- TOP HUD ---------- */\n.hud { position: absolute; top: 0; left: 0; right: 0; z-index: 12;\n  display: flex; align-items: center; gap: 16px; padding: 22px 26px; pointer-events: none; }\n.brand { display: flex; align-items: center; gap: 11px; pointer-events: auto; }\n.brand .d { width: 22px; height: 22px; border-radius: 5px; border: 1px solid var(--line-2);\n  display: grid; place-items: center; background: linear-gradient(180deg,#1a1a1d,#0c0c0e); }\n.brand .d::after { content: \"\"; width: 9px; height: 9px; background: var(--white);\n  clip-path: polygon(50% 0,100% 50%,50% 100%,0 50%); }\n.brand b { font-weight: 600; letter-spacing: 0.16em; font-size: 13px; }\n.brand span { font-family: var(--mono); font-size: 10px; letter-spacing: 0.22em; color: var(--txt-3); }\n\n.status-pill { margin-left: auto; pointer-events: auto; display: flex; align-items: center; gap: 9px;\n  font-family: var(--mono); font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;\n  color: var(--txt-2); padding: 9px 15px; border-radius: 999px;\n  background: rgba(12,12,14,0.6); border: 1px solid var(--line); backdrop-filter: blur(10px); }\n.status-pill .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--white);\n  box-shadow: 0 0 8px rgba(255,255,255,0.6); transition: .3s; }\n.status-pill .dot.listen { background: var(--blue); box-shadow: 0 0 10px var(--blue); animation: breathe 1.6s ease-in-out infinite; }\n.status-pill .dot.alert { background: var(--orange); box-shadow: 0 0 10px var(--orange); }\n.status-pill .dot.off { background: var(--txt-3); box-shadow: none; }\n@keyframes breathe { 0%,100% { opacity: .4; } 50% { opacity: 1; } }\n\n/* ---------- MODE SWITCHER (Film ↔ Inspect) ---------- */\n.mode-switch { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); z-index: 19;\n  display: flex; gap: 4px; padding: 4px; border-radius: 999px;\n  background: rgba(12,12,14,0.66); border: 1px solid var(--line); backdrop-filter: blur(12px);\n  box-shadow: 0 18px 44px -22px #000; transition: opacity .4s, transform .4s; }\n.ms-btn { font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.14em; text-transform: uppercase;\n  padding: 9px 18px; border-radius: 999px; cursor: pointer; border: 0; background: transparent;\n  color: var(--txt-2); transition: .18s; display: inline-flex; align-items: center; gap: 7px; }\n.ms-btn:hover { color: var(--txt); }\n.ms-btn.active { background: var(--white); color: #0a0a0a; font-weight: 600; }\n/* hidden only while the boot gate is up */\n.stage.booting .mode-switch { opacity: 0; visibility: hidden; pointer-events: none; transform: translateX(-50%) translateY(-10px); }\n@media (max-width: 680px) { .mode-switch { top: 14px; } .ms-btn { padding: 8px 13px; } }\n\n/* ---------- HERO OVERLAY ---------- */\n.hero { position: absolute; left: 0; right: 0; bottom: 0; z-index: 11; padding: 26px;\n  display: flex; align-items: flex-end; justify-content: space-between; gap: 24px; pointer-events: none; }\n.hero-copy { max-width: 460px; pointer-events: auto; }\n.hero-copy .eyebrow { font-family: var(--mono); font-size: 11px; letter-spacing: 0.32em;\n  text-transform: uppercase; color: var(--txt-3); }\n.hero-copy h1 { font-size: clamp(40px, 6vw, 76px); line-height: 0.92; font-weight: 600;\n  letter-spacing: -0.03em; margin: 12px 0 0;\n  background: linear-gradient(180deg,#fff 0%,#cdced3 55%,#76777e 100%);\n  -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }\n.hero-copy .sub { font-family: var(--mono); font-size: 12px; letter-spacing: 0.26em;\n  text-transform: uppercase; color: var(--txt-2); margin: 14px 0 0; }\n.hero-copy .tag { font-size: 15px; color: var(--txt-2); line-height: 1.55; margin: 18px 0 22px; max-width: 380px; }\n.hero-cta { display: flex; gap: 10px; flex-wrap: wrap; }\n.btn { font-family: var(--mono); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;\n  padding: 12px 18px; border-radius: 9px; cursor: pointer; transition: .18s; border: 1px solid var(--line);\n  background: rgba(14,14,16,0.6); color: var(--txt); backdrop-filter: blur(8px); display: inline-flex; align-items: center; gap: 8px; }\n.btn:hover { border-color: var(--line-2); background: rgba(22,22,26,0.8); transform: translateY(-1px); }\n.btn.primary { background: var(--white); color: #0a0a0a; border-color: var(--white); font-weight: 600; }\n.btn.primary:hover { background: #fff; box-shadow: 0 8px 30px -10px rgba(255,255,255,0.4); }\n.btn .ic { width: 12px; height: 12px; display: inline-block; }\n\n.hero-hint { pointer-events: auto; align-self: flex-end; font-family: var(--mono); font-size: 10px;\n  letter-spacing: 0.18em; text-transform: uppercase; color: var(--txt-3); display: flex; align-items: center; gap: 8px; }\n.hero-hint .drag { width: 26px; height: 26px; border: 1px solid var(--line); border-radius: 50%;\n  display: grid; place-items: center; }\n\n/* ---------- CONTROL PANEL ---------- */\n.panel { position: absolute; top: 50%; right: 22px; transform: translateY(-50%); z-index: 14;\n  width: 290px; max-height: 84vh; overflow-y: auto; padding: 4px;\n  background: rgba(10,10,12 id rgba(255,255,255,0.25); }\n.vsw.black { background: linear-gradient(135deg, #2a2a2e 0 48%, #c2c2c8 48% 52%, #0a0a0b 52%); }\n.vsw.white { background: linear-gradient(135deg, #e7e7ea 0 48%, #c2c2c8 48% 52%, #9a9aa0 52%); }\n.pbtn.variant.active .vsw { border-color: rgba(0,0,0,0.3); }\n\n/* toggle rows */\n.prow { display: flex; align-items: center; justify-content: space-between; padding: 7px 0; }\n.prow .lab { font-size: 12px; color: var(--txt); letter-spacing: -0.01em; }\n.prow .lab small { display: block; font-family: var(--mono); font-size: 9px; letter-spacing: 0.06em; color: var(--txt-3); margin-top: 2px; }\n.tgl { width: 38px; height: 21px; border-radius: 999px; border: 1px solid var(--line-2); cursor: pointer;\n  background: rgba(255,255,255,0.04); position: relative; transition: .2s; flex-shrink: 0; }\n.tgl::after { content: \"\"; position: absolute; top: 2px; left: 2px; width: 15px; height: 15px; border-radius: 50%;\n  background: var(--txt-2); transition: .2s; }\n.tgl.on { background: var(--white); border-color: var(--white); }\n.tgl.on::after { left: 19px; background: #0a0a0a; }\n\n/* sliders */\n.pslide { padding: 9px 0; }\n.pslide .top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }\n.pslide .top .lab { font-size: 12px; color: var(--txt); }\n.pslide .top .val { font-family: var(--mono); font-size: 10px; color: var(--txt-3); letter-spacing: 0.08em; }\ninput[type=range] { -webkit-appearance: none; appearance: none; width: 100%; height: 3px; border-radius: 3px;\n  background: var(--line-2); outline: none; }\ninput[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%;\n  background: var(--white); cursor: pointer; border: 2px solid #0a0a0a; box-shadow: 0 0 0 1px var(--line-2); }\ninput[type=range]::-moz-range-thumb { width: 14px; height: 14px; border-radius: 50%; background: var(--white);\n  cursor: pointer; border: 2px solid #0a0a0a; }\n\n/* panel reopen tab */\n.panel-tab { position: absolute; top: 50%; right: 22px; transform: translateY(-50%); z-index: 13;\n  width: 44px; height: 120px; border-radius: 12px; border: 1px solid var(--line); cursor: pointer;\n  background: rgba(10,10,12,0.78); backdrop-filter: blur(14px); display: none; flex-direction: column;\n  align-items: center; justify-content: center; gap: 8px; color: var(--txt-2); }\n.panel-tab.show { display: flex; }\n.panel-tab span { writing-mode: vertical-rl; font-family: var(--mono); font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; }\n\n/* ---------- CINEMATIC CAPTION ---------- */\n.cine-cap { position: absolute; left: 0; right: 0; bottom: 13%; z-index: 16; text-align: center; pointer-events: none;\n  opacity: 0; transition: opacity .6s; }\n.cine-cap .ln { font-family: var(--mono); font-size: 12px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--txt-2); }\n.cine-cap .big { font-size: clamp(26px,4vw,48px); font-weight: 600; letter-spacing: -0.02em; margin-top: 10px;\n  background: linear-gradient(180deg,#fff,#9a9aa0); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }\n.cine-cap.show { opacity: 1; }\n.stage.cinematic .panel, .stage.cinematic .hero, .stage.cinematic .hud, .stage.cinematic .panel-tab { opacity: 0 !important; visibility: hidden !important; pointer-events: none; transition: opacity .5s; }\n.cine-skip { position: absolute; bottom: 26px; right: 26px; z-index: 17; opacity: 0; transition: .3s; }\n.stage.cinematic .cine-skip { opacity: 1; pointer-events: auto; }\n\n/* ---------- EXPLODED LABELS ---------- */\n.labels { position: absolute; inset: 0; z-index: 9; pointer-events: none; }\n.labels.minimal .xlabel .tx i { display: none; }\n.xlabel { position: absolute; transform: translate(-50%,-50%); display: flex; align-items: center; gap: 8px;\n  font-family: var(--mono); font-size: 10px; letter-spacing: 0.08em; color: var(--txt); white-space: nowrap;\n  opacity: 0; transition w-ceramic { background: radial-gradient(120% 90% at 30% 10%, #26201d, #0d0a09 70%); }\n.sw-glass { background: linear-gradient(125deg, rgba(255,255,255,.12), transparent 45%), #08080a; }\n.sw-rubber { background: linear-gradient(180deg,#161616,#0a0a0a); }\n\n/* UI gallery */\n.ui-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; }\n.ui-card { border-radius: 14px; overflow: hidden; border: 1px solid var(--line); background: var(--panel); }\n.ui-card canvas { width: 100%; display: block; aspect-ratio: 16/10; background: #000; }\n.ui-card .cap { display: flex; align-items: center; justify-content: space-between; padding: 13px 16px; border-top: 1px solid var(--line); }\n.ui-card .cap b { font-size: 13.5px; font-weight: 600; }\n.ui-card .cap i { font-family: var(--mono); font-style: normal; font-size: 10px; color: var(--txt-3); letter-spacing: 0.1em; text-transform: uppercase; }\n\n/* exploded explainer */\n.exp-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; }\n.exp-li { display: flex; gap: 12px; align-items: baseline; padding: 14px 16px; border-radius: 11px;\n  background: linear-gradient(180deg,var(--panel-2),var(--panel)); border: 1px solid var(--line); }\n.exp-li .no { font-family: var(--mono); font-size: 11px; color: var(--txt-3); letter-spacing: 0.1em; min-width: 22px; }\n.exp-li .nm b { font-size: 13.5px; font-weight: 600; display: block; }\n.exp-li .nm i { font-style: normal; font-family: var(--mono); font-size: 10px; color: var(--txt-3); letter-spacing: 0.03em; }\n\n.foot { padding: 40px 30px 60px; text-align: center; }\n.foot .tag { font-family: var(--mono); font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--txt-3); }\n.foot-line { margin-top: 14px; font-size: 16px; font-weight: 500; color: var(--txt-2); letter-spacing: -0.01em; }\n\n/* variants comparison */\n.var-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }\n.var-card { display: flex; flex-direction: column; text-align: left; cursor: pointer; padding: 0; overflow: hidden;\n  border-radius: 16px; border: 1px solid var(--line); background: linear-gradient(180deg,var(--panel-2),var(--panel));\n  transition: .2s; font-family: inherit; }\n.var-card:hover { transform: translateY(-3px); border-color: var(--line-2); }\n.var-sw { height: 190px; display: grid; place-items: center; position: relative; overflow: hidden; }\n.var-sw.black { background: radial-gradient(120% 100% at 50% 0%, #1a1a1e, #050506 70%); }\n.var-sw.white { background: radial-gradient(120% 100% at 50% 0%, #d8d8de, #9a9aa0 70%); }\n.var-sw .vchip { width: 150px; height: 70px; border-radius: 10px; transform: perspective(500px) rotateX(42deg);\n  box-shadow: 0 22px 40px -16px rgba(0,0,0,0.8); }\n.var-sw.black .vchip { background: linear-gradient(160deg,#26262b,#0c0c0e); border: 1px solid #34343a;\n  box-shadow: inset 0 1px 0 rgba(255,255,255,0.12), 0 22px 40px -16px #000; }\n.var-sw.white .vchip { background: linear-gradient(160deg,#f0f0f2,#bcbcc2); border: 1px solid #fff;\n  box-shadow: inset 0 1px 0 rgba(255,255,255,0.8), 0 22px 40px -16px rgba(0,0,0,0.5); }\n.var-sw .vchip::after { content: \"\"; position: absolute; left: 50%; top: 50%; transform: translate(-90%,-30%);\n  width: 60px; height: 36px; border-radius: 5px; background: #050507; box-shadow: 0 0 0 2px rgba(180,180,190,0.4); }\n.var-meta { padding: 22px 24px 24px; }\n.var-tag { font-family: var(--mono); font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--txt-3); }\n.var-meta h3 { font-size: 24px; font-weight: 600; letter-spacing: -0.02em; margin: 10px 0 10px; }\n.var-meta p { color: var(--txt-2); font-size: 13.5px; line-height: 1.6; margin: 0 0 18px; }\n.var-spec { display: flex; justify-content: space-between; padding: 9px 0; border-top: 1px solid var(--line); }\n.var-spec span { font-family: var(--mono); font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--txt-3); }\n.var-spec b { font-size: 13px; color: var(--white); font-weight: 600; }\n\n@media (max-width: 1000px) {\n  .spec-grid { grid-template-columns: repeat(2,1fr); }\n  .mat-grid { grid-template-columns: repeat(2,1fr); }\n  .ui-grid, .exp-grid { grid-template-columns: 1fr 1fr; }\n}\n@media (max-width: 680px) {\n  .panel { display: none; } .panel-tab { display: none !important; }\n  .hero { flex-direction: column; align-items: flex-start; }\n  .hero-hint { display: none; }\n  .spec-list, .ui-grid, .exp-grid, .mat-grid { grid-template-columns: 1fr; }\n}\n\n/* =========================================================================\n   BOOT INTRO  ·  unified entry gate (sits above the live 3D scene)\n   ========================================================================= */\n.boot { position: absolute; inset: 0; z-index: 40; display: grid; place-items: center;\n  background: radial-gradient(120% 90% at 50% 35%, #0c0c0e 0%, #050506 58%, #020203 100%);\n  transition: background .9s ease, opacity .9s ease, visibility 0s linear .9s; }\n.boot.reveal { background: radial-gradient(120% 90% at 50% 38%, rgba(9,9,11,.55), rgba(4,4,5,.78) 62%, rgba(2,2,3,.92)); }\n.boot.hide { opacity: 0; visibility: hidden; pointer-events: none; }\n/* while the boot gate is up, suppress the interactive chrome bleeding through the translucent reveal */\n.stage.booting .hero, .stage.booting .panel, .stage.booting .panel-tab, .stage.booting .hud,\n.stage.booting .hotspots, .stage.booting .film-end { opacity: 0 !important; visibility: hidden !important; pointer-events: none !important; }\n.boot-grid { position: absolute; inset: 0; opacity: .55; pointer-events: none;\n  background-image: linear-gradient(rgba(255,255,255,.04) 1px, transparent 1px),\n    linear-gradient(90deg, rgba(255,255,255,.04) 1px, transparent 1px);\n  background-size: 58px 58px;\n  -webkit-mask-image: radial-gradient(72% 60% at 50% 44%, #000 18%, transparent 82%);\n  mask-image: radial-gradient(72% 60% at 50% 44%, #000 18%, transparent 82%); }\n.boot-corner { position: absolute; font-family: var(--mono); font-size: 10.5px; letter-spacing: .22em;\n  text-transform: uppercase; color: var(--txt-3); line-height: 1.9; pointer-events: none; }\n.boot-corner.tl { top: 26px; left: 28px; } .boot-corner.tr { top: 26px; right: 28px; text-align: right; }\n.boot-corner.bl { bottom: 26px; left: 28px; } .boot-corner .hot { color: var(--blue); }\n\n/* phase 1 — boot sequence */\n.boot-seq { position: relative; z-index: 2; text-align: center; display: flex; flex-direction: column; gap: 16px; }\n.boot-seq .bl { font-family: var(--mono); font-size: 13px; letter-spacing: .36em; text-transform: uppercase;\n  color: var(--txt-3); opacity: 0; transform: translateY(8px); transition: .55s cubic-bezier(.16,.84,.34,1);\n  display: flex; align-items: center; justify-content: center; gap: 12px; }\n.boot-seq .bl::before { content: \"\"; width: 0; height: 1px; background: var(--line-2); transition: width .5s ease; }\n.boot-seq .bl.on { opacity: 1; transform: none; color: var(--txt-2); }\n.boot-seq .bl.on::before { width: 26px; }\n.boot-seq .bl.done { color: var(--txt-3); }\n.boot-seq.gone { display: none; }\n\n/* phase 2 — enter card */\n.boot-enter { position: relative; z-index: 2; text-align: center; max-width: 580px; padding: 0 24px;\n  opacity: 0; transform: translateY(12px); transition: .8s cubic-bezier(.16,.84,.34,1); display: none; }\n.boot-enter.show { display: block; opacity: 1; transform: none; }\n.be-mark { width: 60px; height: 60px; margin: 0 auto 24px; }\n.be-eyebrow { font-family: var(--mono); font-size: 11px; letter-spacing: .34em; text-transform: uppercase; color: var(--txt-3); }\n.boot-enter h1 { font-size: clamp(42px, 6.4vw, 78px); line-height: .92; font-weight: 600; letter-spacing: -.035em; margin: 14px 0 0;\n  background: linear-gradient(180deg,#fff 0%,#cdced3 52%,#76777e 100%);\n  -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }\n.be-sub { font-family: var(--mono); font-size: 12px; letter-spacing: .28em; text-transform: uppercase; color: var(--txt-2); margin-top: 16px; }\n.boot-enter p { color: var(--txt-2); font-size: 15px; line-height: 1.62; margin: 20px auto 28px; max-width: 430px; }\n.be-cta { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }\n.boot-led { position: absolute; bottom: 8%; right: 8%; width: 9px; height: 9px; border-radius: 50%;\n  background: var(--blue); box-shadow: 0 0 14px 2px var(--blue); animation: breathe 2.4s ease-in-out infinite; }\n\n/* =========================================================================\n   FILM HUD  ·  chapter readout + progress (cinematic only)\n   ========================================================================= */\n.film-hud { position: absolute; left: 26px; bottom: 26px; z-index: 17; display: flex; align-items: center; gap: 16px;\n  opacity: 0; pointer-events: none; transition: opacity .5s; }\n.stage.cinematic .film-hud { opacity: 1; }\n.fh-track { width: 220px; height: 2px; background: var(--line-2); border-radius: 2px; overflow: hidden; }\n.fh-track i { display: block; height: 100%; width: 0; background: var(--white); box-shadow: 0 0 8px rgba(255,255,255,.5); }\n.fh-chap { font-family: var(--mono); font-size: 11px; letter-spacing: .2em; text-transform: uppercase; color: var(--txt-2); display: flex; gap: 9px; }\n.fh-chap b { color: var(--white); }\n\n/* =========================================================================\n   ECOSYSTEM OVERLAY  ·  original module nodes orbiting the real device\n   ========================================================================= */\n.eco { position: absolute; inset: 0; z-index: 15; pointer-events: none; opacity: 0; transition: opacity .6s; }\n.eco.show { opacity: 1; }\n.eco-ringline { position: absolute; left: 50%; top: 47%; transform: translate(-50%,-50%);\n  width: clamp(380px, 46vw, 560px); height: clamp(380px, 46vw, 560px); border: 1px solid var(--line); border-radius: 50%; opacity: .6; }\n.eco-ringline::after { content: \"\"; position: absolute; inset: 12%; border: 1px solid var(--line); border-radius: 50%; opacity: .5; }\n.eco-node { position: absolute; left: 50%; top: 47%; width: 0; height: 0;\n  transform: rotate(var(--a)) translateX(var(--r)); --r: clamp(210px, 25vw, 300px); }\n.eco-node .spoke { position: absolute; left: 0; top: 0; width: var(--r); height: 1px; transform-origin: 0 0; transform: rotate(180deg);\n  background: linear-gradient(90deg, var(--line-2), transparent); opacity: 0; transition: opacity .5s; }\n.eco-node .chip { position: absolute; left: 0; top: 0; width: 158px; padding: 11px 13px; border-radius: 11px;\n  background: rgba(10,10,12,.82); border: 1px solid var(--line); backdrop-filter: blur(12px);\n  box-shadow: 0 18px 40px -18px #000; transform: translate(-50%,-50%) rotate(calc(-1 * var(--a))) scale(.85);\n  opacity: 0; transition: opacity .5s cubic-bezier(.16,.84,.34,1), transform .5s cubic-bezier(.16,.84,.34,1); }\n.eco-node.in .chip { opacity: 1; transform: translate(-50%,-50%) rotate(calc(-1 * var(--a))) scale(1); }\n.eco-node.in .spoke { opacity: 1; }\n.eco-node .chip .no { font-family: var(--mono); font-size: 9px; letter-spacing: .2em; color: var(--txt-3); }\n.eco-node .chip b { display: block; font-size: 13.5px; font-weight: 600; color: var(--white); margin: 3px 0 5px; letter-spacing: -.01em; }\n.eco-node .chip .st { display: flex; align-items: center; gap: 7px; font-family: var(--mono); font-size: 10px; letter-spacing: .08em; color: var(--txt-2); }\n.eco-node .chip .st .d { width: 5px; height: 5px; border-radius: 50%; background: var(--white); box-shadow: 0 0 6px rgba(255,255,255,.6); }\n.eco-node .chip .st .d.hot { background: var(--blue); box-shadow: 0 0 7px var(--blue); }\n\n/* =========================================================================\n   FILM END TOAST  ·  clean handoff (Inspect / Replay)\n   ========================================================================= */\n.film-end { position: absolute; left: 50%; bottom: 30px; transform: translate(-50%, 22px); z-index: 18;\n  display: flex; align-items: center; gap: 12px; padding: 12px 12px 12px 18px; border-radius: 14px;\n  background: rgba(10,10,12,.86); border: 1px solid var(--line); backdrop-filter: blur(18px);\n  box-shadow: 0 24px 60px -24px #000; opacity: 0; visibility: hidden; transition: .45s cubic-bezier(.16,.84,.34,1); }\n.film-end.show { opacity: 1; visibility: visible; transform: translate(-50%, 0); }\n.film-end .fe-txt { font-family: var(--mono); font-size: 11px; letter-spacing: .16em; text-transform: uppercase; color: var(--txt-2); margin-right: 4px; }\n\n@media (max-width: 680px) {\n  .eco-ringline { display: none; }\n  .eco-node { --r: clamp(140px, 38vw, 200px); }\n  .eco-node .chip { width: 128px; padding: 8px 10px; }\n  .film-hud .fh-track { width: 120px; }\n}\n<\u002Fstyle>\n<\u002Fhead>\n\n<body>\n\n<!-- ===================== STAGE ===================== -->\n<div class=\"stage\" id=\"stage\">\n  <canvas id=\"scene\"><\u002Fcanvas>\n\n  <!-- ===== BOOT INTRO — unified entry gate ===== -->\n  <div class=\"boot\" id=\"boot\">\n    <div class=\"boot-grid\"><\u002Fdiv>\n    <div class=\"boot-corner tl\">ATLAS SYSTEM<br>ATL-01<\u002Fdiv>\n    <div class=\"boot-corner tr\">No. 27122005<br>PERSONAL COMMAND SYSTEM<\u002Fdiv>\n    <div class=\"boot-corner bl\"><span class=\"hot\">●<\u002Fspan> SECURE BOOT<\u002Fdiv>\n\n    <div class=\"boot-seq\" id=\"boot-seq\">\n      <div class=\"bl\">ATLAS SYSTEM · INITIALIZING<\u002Fdiv>\n      <div class=\"bl\">CORE SIGNAL DETECTED<\u002Fdiv>\n      <div class=\"bl\">PERSONAL COMMAND SYSTEM ONLINE<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"boot-enter\" id=\"boot-enter\">\n      <div class=\"be-mark\">\n        <svg viewBox=\"0 0 120 120\" style=\"width:100%;height:100%;overflow:visible\">\n          <defs>\n            <linearGradient id=\"beBar\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\">\n              <stop offset=\"0\" stop-color=\"#f2f2f0\"><\u002Fstop><stop offset=\".5\" stop-color=\"# las Ready<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- persistent mode switcher (Film ↔ Inspect) -->\n  <div class=\"mode-switch\" id=\"mode-switch\">\n    <button class=\"ms-btn\" data-mode=\"film\" id=\"ms-film\">▶ Film<\u002Fbutton>\n    <button class=\"ms-btn active\" data-mode=\"inspect\" id=\"ms-inspect\">◎ Inspect<\u002Fbutton>\n  <\u002Fdiv>\n\n  <!-- exploded labels -->\n  <div class=\"labels\" id=\"labels\"><\u002Fdiv>\n\n  <!-- cinematic caption -->\n  <div class=\"cine-cap\" id=\"cine-cap\">\n    <div class=\"ln\" id=\"cap-ln\"><\u002Fdiv>\n    <div class=\"big\" id=\"cap-big\"><\u002Fdiv>\n  <\u002Fdiv>\n  <button class=\"btn cine-skip\" id=\"cine-skip\">Skip ▸<\u002Fbutton>\n\n  <!-- ecosystem overlay (film act 04) -->\n  <div class=\"eco\" id=\"eco\">\n    <div class=\"eco-ringline\"><\u002Fdiv>\n    <div class=\"eco-node\" style=\"--a:0deg\"><div class=\"spoke\"><\u002Fdiv><div class=\"chip\"><div class=\"no\">MODULE 01<\u002Fdiv><b>AI Assistant<\u002Fb><div class=\"st\"><span class=\"d hot\"><\u002Fspan>VOICE · MEMORY<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n    <div class=\"eco-node\" style=\"--a:45deg\"><div class=\"spoke\"><\u002Fdiv><div class=\"chip\"><div class=\"no\">MODULE 02<\u002Fdiv><b>Smart Home<\u002Fb><div class=\"st\"><span class=\"d\"><\u002Fspan>08 DEVICES<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n    <div class=\"eco-node\" style=\"--a:90deg\"><div class=\"spoke\"><\u002Fdiv><div class=\"chip\"><div class=\"no\">MODULE 03<\u002Fdiv><b>Automations<\u002Fb><div class=\"st\"><span class=\"d\"><\u002Fspan>11 / 11 ACTIVE<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n    <div class=\"eco-node\" style=\"--a:135deg\"><div class=\"spoke\"><\u002Fdiv><div class=\"chip\"><div class=\"no\">MODULE 04<\u002Fdiv><b>Productivity<\u002Fb><div class=\"st\"><span class=\"d\"><\u002Fspan>FOCUS MODE<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n    <div class=\"eco-node\" style=\"--a:180deg\"><div class=\"spoke\"><\u002Fdiv><div class=\"chip\"><div class=\"no\">MODULE 05<\u002Fdiv>
